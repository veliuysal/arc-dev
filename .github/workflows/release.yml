name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Configure cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Package binary
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stem="arc-dev-${version}-${{ matrix.target }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "target/${{ matrix.target }}/release/arc-dev.exe" arc-dev.exe
            zip -j "${stem}.zip" arc-dev.exe
          else
            cp "target/${{ matrix.target }}/release/arc-dev" arc-dev
            tar czf "${stem}.tar.gz" arc-dev
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: arc-dev-${{ matrix.target }}
          path: arc-dev-*


  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**

  publish-cargo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set, skipping cargo publish"
            exit 0
          fi
          cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  publish-package-managers:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync package manager repositories
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_MANAGERS_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PACKAGE_MANAGERS_TOKEN not set, skipping Homebrew and Scoop update"
            exit 0
          fi
          version="${VERSION#v}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/veliuysal/homebrew-tap.git" /tmp/homebrew-tap
          git clone "https://x-access-token:${GH_TOKEN}@github.com/veliuysal/scoop-bucket.git" /tmp/scoop-bucket
          cp packaging/homebrew/arc-dev.rb /tmp/homebrew-tap/Formula/arc-dev.rb
          cp packaging/scoop/arc-dev.json /tmp/scoop-bucket/arc-dev.json
          HOMEBREW_FORMULA=/tmp/homebrew-tap/Formula/arc-dev.rb \
          SCOOP_MANIFEST=/tmp/scoop-bucket/arc-dev.json \
            bash scripts/update-package-managers.sh "$version"
          for repo in homebrew-tap scoop-bucket; do
            cd "/tmp/${repo}"
            git add .
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git diff --staged --quiet || git commit -m "arc-dev ${version}"
            git push origin main
          done
